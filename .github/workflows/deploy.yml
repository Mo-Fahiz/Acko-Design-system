# GitHub Pages: use Actions to publish the Vite build (apps/playground/dist).
# Do NOT use "Deploy from a branch" — the repo root has no index.html.
#
# After unpublishing or first setup:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
# Then push Version-4.1 (or Actions → Deploy to GitHub Pages → Run workflow).
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, Version-4.1, Version-2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build playground
        env:
          # Ensure Vite `base` is /Acko-Design-system/ (matches repo name path on github.io)
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: pnpm --filter=playground build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/playground/dist

      - id: deployment
        uses: actions/deploy-pages@v4
