# GitHub Pages: publish the Vite build (apps/playground/dist) via GitHub Actions.
# Optional static index.html at repo root and in docs/ helps branch-based Pages avoid a bare
# 404, but the interactive playground is this workflow's artifact. Prefer:
# Settings → Pages → Source: GitHub Actions.
#
# Then push main / Version-4.1 / Version-4.2 or run workflow manually.
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, Version-4.1, Version-4.2, Version-2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build playground
        env:
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: pnpm --filter=playground build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
